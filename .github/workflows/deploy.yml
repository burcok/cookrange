name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub Secrets:
#
# iOS:
#   APPLE_CERTIFICATE_BASE64          – P12 distribution certificate (base64-encoded)
#   APPLE_CERTIFICATE_PASSWORD        – P12 decryption password
#   APPLE_PROVISIONING_PROFILE_BASE64 – App Store provisioning profile (base64-encoded)
#   APPLE_DEVELOPMENT_TEAM            – Apple Team ID (e.g. ABC1234XYZ)
#   APP_STORE_CONNECT_KEY_ID          – App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID       – App Store Connect issuer UUID
#   APP_STORE_CONNECT_PRIVATE_KEY     – App Store Connect .p8 private key (raw PEM content)
#
# Android:
#   ANDROID_KEYSTORE_BASE64           – Release keystore (.jks, base64-encoded)
#   ANDROID_KEY_ALIAS                 – Key alias in keystore
#   ANDROID_KEY_PASSWORD              – Key password
#   ANDROID_STORE_PASSWORD            – Keystore password
#   PLAY_STORE_SERVICE_ACCOUNT_JSON   – Google Play service account credentials JSON
#
# Shared:
#   OPENROUTER_API_KEY                – Injected into .env for build

jobs:
  deploy-ios:
    name: TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env
        run: echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Import distribution certificate into keychain
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-kp
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            "$(security list-keychains -d user | sed s/\"//g)"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode \
            -o "$PROFILE_DIR/cookrange_appstore.mobileprovision"

      - name: Inject team ID into ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: |
          sed -i '' "s/APPLE_TEAM_ID/$DEVELOPMENT_TEAM/g" ios/ExportOptions.plist

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey_${KEY_ID}.p8
          echo "$PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --apiKeyPath "$KEY_PATH" \
            --output-format xml

          rm -f "$KEY_PATH"

      - name: Clean signing keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  deploy-android:
    name: Play Store (internal)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env
        run: echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=release.jks
          EOF

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.cookrange_android.app
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
          status: completed
